<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ワイン検定 模擬テスト</title>
<style>
  :root {
    --wine: #7b1f3a;
    --wine-light: #a03050;
    --gold: #c9a84c;
    --bg: #fdf8f2;
    --bg-card: #fff;
    --text: #2c1a1a;
    --text-light: #6b4c4c;
    --correct: #2e7d32;
    --correct-bg: #e8f5e9;
    --wrong: #c62828;
    --wrong-bg: #ffebee;
    --border: #e0cfc0;
    --shadow: 0 2px 8px rgba(123,31,58,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, var(--wine) 0%, #4a0e22 100%);
    color: #fff;
    text-align: center;
    padding: 2.5rem 1rem 2rem;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '🍷';
    font-size: 4rem;
    position: absolute;
    top: 1rem; left: 2rem;
    opacity: 0.15;
  }
  header::after {
    content: '🍷';
    font-size: 4rem;
    position: absolute;
    top: 1rem; right: 2rem;
    opacity: 0.15;
  }
  header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin-bottom: 0.4rem;
  }
  header p {
    font-size: 0.95rem;
    opacity: 0.85;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem 1rem;
  }

  /* Start screen */
  #start-screen {
    text-align: center;
    padding: 3rem 1rem;
  }
  #start-screen h2 {
    font-size: 1.4rem;
    color: var(--wine);
    margin-bottom: 1rem;
  }
  #start-screen p {
    color: var(--text-light);
    margin-bottom: 2rem;
    line-height: 1.7;
  }

  /* Quiz */
  #quiz-screen { display: none; }
  #result-screen { display: none; }

  .progress-bar-wrap {
    background: var(--border);
    border-radius: 9999px;
    height: 8px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--wine), var(--gold));
    border-radius: 9999px;
    transition: width 0.4s ease;
  }
  .progress-label {
    text-align: right;
    font-size: 0.82rem;
    color: var(--text-light);
    margin-bottom: 0.5rem;
  }

  .question-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    box-shadow: var(--shadow);
    margin-bottom: 1.5rem;
  }
  .question-number {
    font-size: 0.8rem;
    color: var(--wine);
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 0.6rem;
    text-transform: uppercase;
  }
  .question-text {
    font-size: 1.05rem;
    line-height: 1.7;
    font-weight: 600;
    margin-bottom: 1.5rem;
    color: var(--text);
  }

  .choices {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .choice-btn {
    background: var(--bg);
    border: 2px solid var(--border);
    border-radius: 12px;
    padding: 0.9rem 1.2rem;
    font-size: 0.97rem;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--wine-light);
    background: #fef5f7;
    transform: translateX(4px);
  }
  .choice-btn.selected {
    border-color: var(--wine);
    background: #fdf0f3;
  }
  .choice-btn:disabled { cursor: default; }

  /* Hint */
  details.hint-wrap {
    margin-top: 1rem;
  }
  details.hint-wrap summary {
    display: inline-flex;
    align-items: center;
    gap: 0.4em;
    list-style: none;
    background: none;
    border: 1px solid var(--gold);
    border-radius: 9999px;
    color: #8a6a00;
    font-size: 0.82rem;
    padding: 0.3rem 1rem;
    cursor: pointer;
    transition: background 0.2s;
    user-select: none;
  }
  details.hint-wrap summary::-webkit-details-marker { display: none; }
  details.hint-wrap summary::marker { display: none; }
  details.hint-wrap summary:hover { background: #fff8e1; }
  details.hint-wrap summary .arrow { transition: transform 0.25s; display: inline-block; }
  details.hint-wrap[open] summary .arrow { transform: rotate(180deg); }
  .hint-body {
    margin-top: 0.6rem;
    background: #fffbf0;
    border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0;
    padding: 0.75rem 1rem;
    font-size: 0.88rem;
    color: #5a4a00;
    line-height: 1.7;
  }

  /* Navigation */
  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    margin-top: 1rem;
  }
  .btn {
    background: linear-gradient(135deg, var(--wine), var(--wine-light));
    color: #fff;
    border: none;
    border-radius: 9999px;
    padding: 0.75rem 2rem;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.05em;
  }
  .btn:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-gold {
    background: linear-gradient(135deg, var(--gold), #a87828);
  }
  .btn-outline {
    background: transparent;
    color: var(--wine);
    border: 2px solid var(--wine);
  }
  .btn-outline:hover { background: #fdf0f3; }

  .unanswered-warning {
    font-size: 0.85rem;
    color: var(--wrong);
    margin-top: 0.5rem;
    display: none;
  }

  /* Submit area */
  .submit-area {
    text-align: center;
    padding: 2rem 0;
    border-top: 1px dashed var(--border);
    margin-top: 1rem;
  }
  .submit-area p {
    color: var(--text-light);
    font-size: 0.9rem;
    margin-bottom: 1rem;
  }

  /* Result screen */
  .score-card {
    background: linear-gradient(135deg, var(--wine) 0%, #4a0e22 100%);
    color: #fff;
    border-radius: 20px;
    padding: 2.5rem;
    text-align: center;
    margin-bottom: 2rem;
    box-shadow: 0 4px 20px rgba(123,31,58,0.3);
  }
  .score-label { font-size: 1rem; opacity: 0.85; margin-bottom: 0.5rem; }
  .score-number {
    font-size: 4rem;
    font-weight: 800;
    line-height: 1;
  }
  .score-number span { font-size: 1.5rem; opacity: 0.7; }
  .score-percent {
    font-size: 1.4rem;
    margin-top: 0.5rem;
    color: var(--gold);
    font-weight: 700;
  }
  .score-message {
    margin-top: 1rem;
    font-size: 1.05rem;
    opacity: 0.9;
  }

  .result-stats {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    justify-content: center;
  }
  .stat-box {
    flex: 1;
    max-width: 160px;
    border-radius: 12px;
    padding: 1rem;
    text-align: center;
    font-size: 0.85rem;
    font-weight: 600;
  }
  .stat-correct { background: var(--correct-bg); color: var(--correct); }
  .stat-wrong { background: var(--wrong-bg); color: var(--wrong); }
  .stat-box .stat-num { font-size: 2rem; font-weight: 800; display: block; }

  .review-section h2 {
    font-size: 1.2rem;
    color: var(--wine);
    margin-bottom: 1.2rem;
    border-left: 4px solid var(--wine);
    padding-left: 0.75rem;
  }

  .review-item {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.4rem;
    margin-bottom: 1rem;
    box-shadow: var(--shadow);
  }
  .review-item.correct-item {
    border-left: 4px solid var(--correct);
  }
  .review-item.wrong-item {
    border-left: 4px solid var(--wrong);
  }
  .review-q-num {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }
  .correct-item .review-q-num { color: var(--correct); }
  .wrong-item .review-q-num { color: var(--wrong); }

  .review-q-text {
    font-size: 0.97rem;
    font-weight: 600;
    margin-bottom: 0.8rem;
    line-height: 1.6;
  }
  .review-answer-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .badge {
    font-size: 0.8rem;
    border-radius: 9999px;
    padding: 0.3rem 0.9rem;
    font-weight: 700;
  }
  .badge-your { background: var(--wrong-bg); color: var(--wrong); }
  .badge-correct { background: var(--correct-bg); color: var(--correct); }
  .badge-your-correct { background: var(--correct-bg); color: var(--correct); }

  .explanation {
    background: #fff8e1;
    border-left: 3px solid var(--gold);
    border-radius: 0 8px 8px 0;
    padding: 0.8rem 1rem;
    font-size: 0.88rem;
    color: #5a4a00;
    line-height: 1.7;
    margin-top: 0.6rem;
  }
  .explanation strong { color: var(--wine); }

  .all-correct-msg {
    text-align: center;
    padding: 2rem;
    color: var(--correct);
    font-size: 1.2rem;
    font-weight: 700;
  }

  /* No answer indicator in result */
  .result-choice {
    padding: 0.6rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    margin-bottom: 0.4rem;
  }
  .result-choice.correct-choice {
    background: var(--correct-bg);
    color: var(--correct);
    font-weight: 600;
  }
  .result-choice.wrong-choice {
    background: var(--wrong-bg);
    color: var(--wrong);
    text-decoration: line-through;
    opacity: 0.85;
  }

  /* Scroll to top */
  .back-to-top {
    text-align: center;
    margin-top: 2rem;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 1.4rem; }
    .question-card { padding: 1.3rem; }
    .score-number { font-size: 3rem; }
    .result-stats { flex-direction: column; align-items: center; }
    .stat-box { max-width: none; width: 100%; }
  }
</style>
</head>
<body>

<header>
  <h1>🍷 ワイン検定 模擬テスト</h1>
  <p>全50問 ｜ 3択形式</p>
</header>

<div class="container">

  <!-- Start Screen -->
  <div id="start-screen">
    <h2>テストを始める前に</h2>
    <p>全50問の3択問題です。<br>
       すべて回答してから「採点する」を押してください。<br>
       間違えた問題には解説が表示されます。</p>
    <button class="btn btn-gold" onclick="startQuiz()">テスト開始 ▶</button>
  </div>

  <!-- Quiz Screen -->
  <div id="quiz-screen">
    <div class="progress-label" id="progress-label">1 / 50</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:2%"></div>
    </div>

    <div id="questions-container"></div>

    <div class="submit-area">
      <p id="submit-hint">全問回答すると採点できます</p>
      <button class="btn btn-gold" id="submit-btn" onclick="submitQuiz()" disabled>採点する ✓</button>
      <p class="unanswered-warning" id="unanswered-warning">未回答の問題があります。すべての問題に答えてから採点してください。</p>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="result-screen">
    <div class="score-card">
      <div class="score-label">あなたのスコア</div>
      <div class="score-number" id="score-number">0<span> / 50</span></div>
      <div class="score-percent" id="score-percent">0%</div>
      <div class="score-message" id="score-message"></div>
    </div>

    <div class="result-stats">
      <div class="stat-box stat-correct">
        <span class="stat-num" id="stat-correct">0</span>
        正解
      </div>
      <div class="stat-box stat-wrong">
        <span class="stat-num" id="stat-wrong">0</span>
        不正解
      </div>
    </div>

    <div class="review-section">
      <h2 id="review-title">間違えた問題の解説</h2>
      <div id="review-container"></div>
    </div>

    <div class="back-to-top">
      <button class="btn" onclick="retryQuiz()">もう一度挑戦する</button>
    </div>
  </div>

</div>

<script>
const questions = [
  {
    q: "ブドウ果汁の糖分を発酵させる微生物は何か？",
    choices: ["酵母菌", "乳酸菌", "麹菌"],
    answer: 0,
    hint: "発酵の母、イーストとも言う。",
    explanation: "ワインの発酵は<strong>酵母菌</strong>がブドウ糖をアルコールと二酸化炭素に分解することで起こります。乳酸菌はマロラクティック発酵で使われ、麹菌は日本酒などに使われます。"
  },
  {
    q: "ワインに関する法律が記載された古代バビロニアの法典は？",
    choices: ["ハンムラビ法典", "ナポレオン法典", "ローゼッタストーン"],
    answer: 0,
    hint: "世界最古の法典。「目には目を、歯には歯を」で有名。",
    explanation: "紀元前1750年頃の<strong>ハンムラビ法典</strong>には、ワインの販売・品質に関する規定が含まれています。現存する世界最古のワイン関連法律とされています。"
  },
  {
    q: "フィロキセラの別名は？",
    choices: ["ブドウネアブラムシ", "ブドウカイガラムシ", "ブドウハダニ"],
    answer: 0,
    hint: "漢字で「葡萄根油虫」と書く。",
    explanation: "<strong>フィロキセラ（ブドウネアブラムシ）</strong>は19世紀後半にヨーロッパのブドウ畑を壊滅させた害虫です。北米原産で、ブドウの根に寄生して枯死させます。"
  },
  {
    q: "シャンパーニュと同製法でフランスの8地方で造られるスパークリングワインの名称は？",
    choices: ["クレマン", "プロセッコ", "カバ"],
    answer: 0,
    hint: "シャンパーニュと同製法で造る。フランスの8地方で製造される。",
    explanation: "<strong>クレマン</strong>はフランスのシャンパーニュ地方以外で造られる瓶内二次発酵スパークリングワインの総称です。アルザス・クレマン、ブルゴーニュ・クレマンなどがあります。"
  },
  {
    q: "発酵途中にブランデーを加えアルコール度数を高めたワインの分類は？（マデイラ・シェリー・ポートなど）",
    choices: ["フォーティファイド・ワイン", "スパークリングワイン", "オレンジワイン"],
    answer: 0,
    hint: "アルコール強化ワインのこと。ポルトガルのマデイラ島で製造。",
    explanation: "<strong>マデイラ</strong>はポルトガルのマデイラ島で造られるフォーティファイドワイン（酒精強化ワイン）です。発酵途中にブランデーを加えアルコール度数を高めます。シェリー・ポートも同じ分類。"
  },
  {
    q: "ブドウ栽培に最適な年平均気温は？",
    choices: ["10〜16℃", "5〜10℃", "16〜22℃"],
    answer: 0,
    hint: "北海道9℃、首都圏や近畿は16℃、四国や九州北部は17℃、鹿児島19℃、沖縄23℃",
    explanation: "<strong>10〜16℃</strong>が良質なワイン用ブドウに適した年平均気温です。この温度帯が北緯・南緯30〜50度に相当し、世界の主要ワイン産地が集中しています。"
  },
  {
    q: "ブドウの生育に望ましい年間降水量は？",
    choices: ["500〜900mm", "200〜500mm", "900〜1200mm"],
    answer: 0,
    hint: "雨水ゴックン！（長野でも970mm、北海道1150mm、山梨1160mm、全国平均1670mm、高知2670mm）",
    explanation: "<strong>500〜900mm</strong>が理想的な年間降水量です。少なすぎると水不足、多すぎると病気の原因になります。灌漑が禁止されている地域では自然降雨のみに頼ります。"
  },
  {
    q: "北半球で気温が何℃を超えるとブドウは休眠から目覚めるか？",
    choices: ["10℃", "5℃", "15℃"],
    answer: 0,
    hint: "10℃以下では冬眠状態。",
    explanation: "<strong>10℃</strong>を超えると根が養分の吸収を再開し、新芽が芽吹き始めます（萌芽）。この時期から霜害のリスクが高まり、生産者は注意が必要です。"
  },
  {
    q: "発酵中の果汁に果皮や種子を漬け込み、色素やタンニンを抽出する赤ワイン醸造の工程は？",
    choices: ["醸し（かもし）", "圧搾", "除梗"],
    answer: 0,
    hint: "「醸し」とは、発酵中の果汁に果皮や種子を漬け込み、色素やタンニン（渋み）を抽出する工程のこと。",
    explanation: "赤ワインは<strong>除梗・破砕→主発酵・醸し（果皮ごと発酵）→圧搾→熟成</strong>の順です。果皮と一緒に発酵させることで色素（アントシアニン）とタンニンを抽出します。"
  },
  {
    q: "白ワインのマロラクティック発酵（MLF）を行う主な目的は？",
    choices: ["酸味をやわらげるため", "甘みを増やすため", "アルコール度数を上げるため"],
    answer: 0,
    hint: "リンゴ酸（マリック・アシッド）が、乳酸菌によって乳酸（ラクティック・アシッド）と炭酸ガスに変化する。",
    explanation: "<strong>マロラクティック発酵</strong>では乳酸菌がリンゴ酸を乳酸に変換します。乳酸はリンゴ酸より穏やかな酸なので、ワインの酸味が丸く柔らかくなります。ブルゴーニュの白などで行われます。"
  },
  {
    q: "明るい色合いで白ワインに近い個性を持つロゼワインの製法は？",
    choices: [
      "直接圧搾法",
      "醸し法",
      "ブレンド法"
    ],
    answer: 0,
    hint: "黒ブドウをプレスして果汁を搾り出す際に、皮や種から赤い色素をわずかに抽出する方法。白ワインの醸造方法に似ている。",
    explanation: "直接圧搾法は黒ブドウを果皮ごと軽く圧搾してすぐに果汁を分離するため、色素抽出が少なく<strong>明るく淡い色</strong>で白ワインに近い繊細な個性になります。"
  },
  {
    q: "タンク内で酵母と糖分を加えて二次発酵を行うスパークリングワインの製造方式は？",
    choices: ["シャルマ方式", "瓶内二次発酵方式", "トランスファー方式"],
    answer: 0,
    hint: "フランス人のユージン・シャルマが考案し命名した方式。",
    explanation: "<strong>シャルマ方式（タンク方式）</strong>は密閉した大型タンクに酵母と糖分を加えて二次発酵を行います。プロセッコはこの方式で造られます。コストを抑えながら大量生産が可能。"
  },
  {
    q: "瓶内二次発酵方式で造られるスペインのスパークリングワインは？",
    choices: ["カバ（Cava）", "プロセッコ", "フランチャコルタ"],
    answer: 0,
    hint: "スペインのカタローニャ地方で、シャンパーニュと同じ製法で造られる。",
    explanation: "<strong>カバ</strong>はスペインのカタルーニャ地方を中心に生産される瓶内二次発酵のスパークリングワインです。プロセッコ（イタリア）はタンク方式、フランチャコルタ（イタリア）は瓶内二次発酵。"
  },
  {
    q: "シャブリに使用されるブドウ品種は？",
    choices: ["シャルドネ", "ソーヴィニヨン・ブラン", "リースリング"],
    answer: 0,
    hint: "フランス・ブルゴーニュ地方・シャブリ地区のワイン。シャルドネは「白ワインの女王」とも呼ばれ、樽熟成させるとバニラのような芳醇なコクが出る。",
    explanation: "シャブリはフランス・ブルゴーニュ北部の産地で、100%<strong>シャルドネ</strong>で造られます。石灰質土壌（キンメリジャン）由来のミネラル感と引き締まった酸味が特徴です。"
  },
  {
    q: "ボルドー地方で最も多く生産される黒ブドウ品種は？",

      "フルボディの赤ワイン",
      "甘口のスパークリングワイン"
    ],
    answer: 0,
    hint: "シェーブルタイプのチーズは山羊乳から造られ酸味とコクがあるため、合わせるのは？",
    explanation: "山羊乳製の<strong>シェーブルチーズ</strong>はシャープな酸味とコクが特徴。酸味のある辛口白（ソーヴィニヨン・ブランなど）やライトボディの赤が合います。フルボディの赤はタンニンが強すぎ、チーズの風味を壊します。"
  }
];

let userAnswers = new Array(questions.length).fill(null);
let answeredCount = 0;
let shuffledQuestions = [];

function startQuiz() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  renderQuestions();
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function renderQuestions() {
  shuffledQuestions = [];
  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  questions.forEach((q, qi) => {
    // シャッフル
    const order = shuffle([0, 1, 2]);
    const choices = order.map(i => q.choices[i]);
    const answer = order.indexOf(q.answer);
    shuffledQuestions.push({ choices, answer });

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'q-card-' + qi;

    const choicesHtml = choices.map((c, ci) => `
      <button class="choice-btn" id="choice-${qi}-${ci}" onclick="selectAnswer(${qi}, ${ci})">
        ${['A', 'B', 'C'][ci]}. ${c}
      </button>
    `).join('');

    const hintHtml = q.hint ? `
      <details class="hint-wrap">
        <summary>💡 ヒント <span class="arrow">▼</span></summary>
        <div class="hint-body">${q.hint}</div>
      </details>` : '';

    card.innerHTML = `
      <div class="question-number">問題 ${qi + 1} / ${questions.length}</div>
      <div class="question-text">${q.q}</div>
      <div class="choices">${choicesHtml}</div>
      ${hintHtml}
    `;
    container.appendChild(card);
  });

  updateProgress();
}


function selectAnswer(qi, ci) {
  const prev = userAnswers[qi];
  if (prev === null) {
    answeredCount++;
  }
  userAnswers[qi] = ci;

  // Update button styles
  const card = document.getElementById('q-card-' + qi);
  card.querySelectorAll('.choice-btn').forEach((btn, i) => {
    btn.classList.toggle('selected', i === ci);
  });

  updateProgress();
  checkSubmitReady();
}

function updateProgress() {
  const pct = Math.round((answeredCount / questions.length) * 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `回答済み: ${answeredCount} / ${questions.length}`;
}

function checkSubmitReady() {
  const btn = document.getElementById('submit-btn');
  const hint = document.getElementById('submit-hint');
  if (answeredCount === questions.length) {
    btn.disabled = false;
    hint.textContent = '全問回答しました！採点してください。';
    hint.style.color = 'var(--correct)';
  } else {
    btn.disabled = true;
    hint.textContent = `残り ${questions.length - answeredCount} 問あります`;
    hint.style.color = '';
  }
}

function submitQuiz() {
  if (answeredCount < questions.length) {
    document.getElementById('unanswered-warning').style.display = 'block';
    return;
  }

  let correct = 0;
  questions.forEach((q, i) => {
    if (userAnswers[i] === shuffledQuestions[i].answer) correct++;
  });
  const wrong = questions.length - correct;
  const pct = Math.round((correct / questions.length) * 100);

  // Show result screen
  document.getElementById('quiz-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  document.getElementById('score-number').innerHTML = `${correct}<span> / ${questions.length}</span>`;
  document.getElementById('score-percent').textContent = `正答率 ${pct}%`;
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = wrong;

  let msg = '';
  if (pct === 100) msg = '完璧です！満点おめでとうございます！🎉';
  else if (pct >= 90) msg = '素晴らしい！ほぼ完璧な理解度です！';
  else if (pct >= 70) msg = '良い結果です！苦手な分野を復習しましょう。';
  else if (pct >= 50) msg = 'もう少し！復習して再挑戦してみましょう。';
  else msg = '基礎からしっかり復習しましょう。';
  document.getElementById('score-message').textContent = msg;

  // Review section
  const reviewContainer = document.getElementById('review-container');
  reviewContainer.innerHTML = '';

  document.getElementById('review-title').textContent = wrong === 0 ? '全問正解！全問の解説' : `全問の解説（正解 ${correct}問 ／ 不正解 ${wrong}問）`;

  questions.forEach((q, i) => {
    const isCorrect = userAnswers[i] === shuffledQuestions[i].answer;
    const item = document.createElement('div');
    item.className = 'review-item ' + (isCorrect ? 'correct-item' : 'wrong-item');

    const yourChoice = shuffledQuestions[i].choices[userAnswers[i]];
    const correctChoice = shuffledQuestions[i].choices[shuffledQuestions[i].answer];

    const answerRow = isCorrect
      ? `<span class="badge badge-your-correct">✓ 正解: ${correctChoice}</span>`
      : `<span class="badge badge-your">あなたの回答: ${yourChoice}</span>
         <span class="badge badge-correct">正解: ${correctChoice}</span>`;

    item.innerHTML = `
      <div class="review-q-num">${isCorrect ? '✓ 正解' : '✗ 不正解'} ｜ 問題 ${i + 1}</div>
      <div class="review-q-text">${q.q}</div>
      <div class="review-answer-row">${answerRow}</div>
      <div class="explanation">💡 ${q.explanation}</div>
    `;
    reviewContainer.appendChild(item);
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function retryQuiz() {
  userAnswers = new Array(questions.length).fill(null);
  answeredCount = 0;
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('submit-hint').textContent = '全問回答すると採点できます';
  document.getElementById('submit-hint').style.color = '';
  document.getElementById('unanswered-warning').style.display = 'none';
  renderQuestions();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
